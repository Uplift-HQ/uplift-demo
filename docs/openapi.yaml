openapi: 3.0.3
info:
  title: Uplift Core API
  description: |
    Workforce management platform API for scheduling, time tracking, and employee management.
    
    ## Authentication
    All endpoints except `/auth/login`, `/auth/register`, and `/health` require authentication.
    Authentication uses httpOnly cookies set by the login endpoint.
    
    ## CSRF Protection
    Non-GET requests require a CSRF token. Get a token from `GET /csrf-token` and include it in the `X-CSRF-Token` header.
    
    ## Rate Limiting
    - Auth endpoints: 10 requests per 15 minutes
    - API endpoints: 100 requests per 15 minutes
    
  version: 1.0.0
  contact:
    name: Uplift Support
    email: support@uplift.hr

servers:
  - url: http://localhost:3000/api
    description: Development
  - url: https://api.uplifthq.co.uk/api
    description: Production

tags:
  - name: Auth
    description: Authentication and user management
  - name: Employees
    description: Employee management
  - name: Locations
    description: Location management
  - name: Shifts
    description: Shift scheduling
  - name: Time
    description: Time tracking and timesheets
  - name: TimeOff
    description: Time off requests and policies
  - name: Expenses
    description: Expense claims and reimbursements
  - name: Payroll
    description: Payroll processing and exports
  - name: Momentum
    description: Employee engagement and performance scoring
  - name: Dashboard
    description: Analytics and reporting
  - name: Billing
    description: Subscription and billing management
  - name: System
    description: Health checks and system endpoints

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /csrf-token:
    get:
      summary: Get CSRF token
      tags: [System]
      responses:
        '200':
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly cookies with access and refresh tokens
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      summary: Register new organization
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationName, email, password, firstName, lastName]
              properties:
                organizationName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: "Must contain uppercase, lowercase, and number"
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      description: Uses refresh token from cookie to issue new access token. Implements token rotation.
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Logout
      tags: [Auth]
      responses:
        '200':
          description: Logged out

  /auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /employees:
    get:
      summary: List employees
      tags: [Employees]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, terminated]
        - name: departmentId
          in: query
          schema:
            type: string
            format: uuid
        - name: locationId
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Employee list
          content:
            application/json:
              schema:
                type: object
                properties:
                  employees:
                    type: array
                    items:
                      $ref: '#/components/schemas/Employee'
                  total:
                    type: integer
                  page:
                    type: integer
                  pages:
                    type: integer
    post:
      summary: Create employee
      tags: [Employees]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                type: object
                properties:
                  employee:
                    $ref: '#/components/schemas/Employee'

  /employees/{id}:
    get:
      summary: Get employee
      tags: [Employees]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                type: object
                properties:
                  employee:
                    $ref: '#/components/schemas/Employee'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update employee
      tags: [Employees]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeInput'
      responses:
        '200':
          description: Employee updated
    delete:
      summary: Delete employee
      tags: [Employees]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Employee deleted

  /shifts:
    get:
      summary: List shifts
      tags: [Shifts]
      security:
        - cookieAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: locationId
          in: query
          schema:
            type: string
            format: uuid
        - name: employeeId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shift list
          content:
            application/json:
              schema:
                type: object
                properties:
                  shifts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shift'
    post:
      summary: Create shift
      tags: [Shifts]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftInput'
      responses:
        '201':
          description: Shift created

  /time/clock-in:
    post:
      summary: Clock in
      tags: [Time]
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                locationId:
                  type: string
                  format: uuid
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '200':
          description: Clocked in

  /time/clock-out:
    post:
      summary: Clock out
      tags: [Time]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Clocked out

  /time/entries:
    get:
      summary: List time entries
      tags: [Time]
      security:
        - cookieAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Time entries

  /time/pending:
    get:
      summary: Get pending approvals
      tags: [Time]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Pending time entries

  /time-off/policies:
    get:
      summary: List time off policies
      tags: [TimeOff]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Policy list

  /time-off/requests:
    get:
      summary: List time off requests
      tags: [TimeOff]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Request list
    post:
      summary: Create time off request
      tags: [TimeOff]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policyId, startDate, endDate]
              properties:
                policyId:
                  type: string
                  format: uuid
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                reason:
                  type: string
      responses:
        '201':
          description: Request created

  /dashboard:
    get:
      summary: Get dashboard data
      tags: [Dashboard]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  today:
                    type: object
                  week:
                    type: object
                  pending:
                    type: object

  /reports/hours:
    get:
      summary: Hours worked report
      tags: [Dashboard]
      security:
        - cookieAuth: []
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          schema:
            type: string
            enum: [employee, location, day]
      responses:
        '200':
          description: Hours report

  # ==================== EXPENSES ====================

  /expenses/my-expenses:
    get:
      summary: List my expense claims
      tags: [Expenses]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending, approved, rejected, paid]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Expense claims list
          content:
            application/json:
              schema:
                type: object
                properties:
                  expenses:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpenseClaim'
                  totals:
                    type: object

  /expenses/claims:
    post:
      summary: Create expense claim
      tags: [Expenses]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExpenseClaimInput'
      responses:
        '201':
          description: Claim created
          content:
            application/json:
              schema:
                type: object
                properties:
                  claim:
                    $ref: '#/components/schemas/ExpenseClaim'

  /expenses/receipts/scan:
    post:
      summary: Scan receipt with OCR
      tags: [Expenses]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                receipt:
                  type: string
                  format: binary
                  description: Receipt image (JPG, PNG, PDF)
                expectedCurrency:
                  type: string
                  enum: [GBP, USD, EUR]
      responses:
        '200':
          description: OCR extraction result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  receiptUrl:
                    type: string
                  extracted:
                    type: object
                    properties:
                      amount:
                        type: number
                      currency:
                        type: string
                      date:
                        type: string
                      merchant:
                        type: string
                  confidence:
                    type: integer

  /expenses/claims/{id}/approve:
    post:
      summary: Approve expense claim
      tags: [Expenses]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Claim approved

  /expenses/claims/{id}/reject:
    post:
      summary: Reject expense claim
      tags: [Expenses]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Claim rejected

  # ==================== MOMENTUM SCORES ====================

  /momentum/me:
    get:
      summary: Get my momentum score
      tags: [Momentum]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user's momentum score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentumScore'

  /momentum/dashboard:
    get:
      summary: Get organization momentum dashboard
      tags: [Momentum]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Momentum dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  orgAverage:
                    type: number
                  distribution:
                    type: array
                  trends:
                    type: object

  /momentum/leaderboard:
    get:
      summary: Get momentum leaderboard
      tags: [Momentum]
      security:
        - cookieAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Top employees by momentum score
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: '#/components/schemas/MomentumScore'

  # ==================== PAYROLL ====================

  /payroll/runs:
    get:
      summary: List payroll runs
      tags: [Payroll]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_approval, approved, processing, completed, failed]
      responses:
        '200':
          description: Payroll runs list

  /payroll/generate:
    post:
      summary: Generate payroll run
      tags: [Payroll]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodStart, periodEnd]
              properties:
                periodStart:
                  type: string
                  format: date
                periodEnd:
                  type: string
                  format: date
                employeeIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '201':
          description: Payroll run created

  /payroll/runs/{id}/approve:
    post:
      summary: Approve payroll run
      tags: [Payroll]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Payroll approved

  /payroll/export/{id}:
    get:
      summary: Export payroll to provider
      tags: [Payroll]
      security:
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/id'
        - name: provider
          in: query
          required: true
          schema:
            type: string
            enum: [payrun, xero, quickbooks, csv]
      responses:
        '200':
          description: Export data

  # ==================== BILLING ====================

  /billing/subscription:
    get:
      summary: Get current subscription
      tags: [Billing]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

  /billing/portal:
    post:
      summary: Create Stripe customer portal session
      tags: [Billing]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Portal session URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string

  # ==================== MFA ====================

  /auth/mfa/setup:
    post:
      summary: Setup MFA
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: MFA setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                  qrCode:
                    type: string

  /auth/mfa/verify:
    post:
      summary: Verify MFA code during login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfaToken, code]
              properties:
                mfaToken:
                  type: string
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: MFA verified, login complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/mfa/enable:
    post:
      summary: Enable MFA after verification
      tags: [Auth]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: MFA enabled

  # ==================== HEALTH (DETAILED) ====================

  /health/detailed:
    get:
      summary: Detailed health check (admin only)
      tags: [System]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Detailed system health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: number
                  memory:
                    type: object
                  database:
                    type: object

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [superadmin, admin, manager, worker]
        organizationId:
          type: string
          format: uuid

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        employeeNumber:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, casual, contractor]
        status:
          type: string
          enum: [active, inactive, terminated]
        startDate:
          type: string
          format: date
        departmentId:
          type: string
          format: uuid
        primaryLocationId:
          type: string
          format: uuid
        hourlyRate:
          type: number

    EmployeeInput:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        employmentType:
          type: string
        startDate:
          type: string
          format: date
        departmentId:
          type: string
          format: uuid
        primaryLocationId:
          type: string
          format: uuid
        hourlyRate:
          type: number

    Shift:
      type: object
      properties:
        id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        employeeId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        isOpen:
          type: boolean
        status:
          type: string
          enum: [scheduled, completed, cancelled]

    ShiftInput:
      type: object
      required: [date, startTime, endTime, locationId]
      properties:
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        employeeId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        isOpen:
          type: boolean
        breakMinutes:
          type: integer

    ExpenseClaim:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
        description:
          type: string
        categoryId:
          type: string
          format: uuid
        categoryName:
          type: string
        amount:
          type: number
        currency:
          type: string
          enum: [GBP, USD, EUR]
        expenseDate:
          type: string
          format: date
        receiptUrl:
          type: string
        status:
          type: string
          enum: [draft, pending, approved, rejected, paid]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    ExpenseClaimInput:
      type: object
      required: [description, amount, expenseDate]
      properties:
        description:
          type: string
          maxLength: 500
        categoryId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0.01
        expenseDate:
          type: string
          format: date
        receiptUrl:
          type: string
        notes:
          type: string
        tags:
          type: array
          items:
            type: string

    MomentumScore:
      type: object
      properties:
        employeeId:
          type: string
          format: uuid
        employeeName:
          type: string
        score:
          type: number
          minimum: 0
          maximum: 100
        trend:
          type: string
          enum: [up, down, stable]
        breakdown:
          type: object
          properties:
            attendance:
              type: number
            punctuality:
              type: number
            shiftCompletion:
              type: number
            skillsGrowth:
              type: number
            recognition:
              type: number
            engagement:
              type: number
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date

    Subscription:
      type: object
      properties:
        id:
          type: string
