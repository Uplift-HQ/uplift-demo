# Netlify build configuration for Uplift OPS Portal

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://api.uplifthq.co.uk"
  VITE_DEMO_MODE = "false"

# SPA routing - redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
